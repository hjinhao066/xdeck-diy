name: Build Windows

# xdeck has no native modules (pure Electron + webviews), so the Windows build
# just packages + builds the NSIS installer — no compiler needed. Produces
# dist/*.exe as an artifact, and attaches it to the GitHub Release on v* tags.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDeck-DIY-Windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Attach installer to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
